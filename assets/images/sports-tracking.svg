<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Algorithm 1 Progressive Filtration</title>
  <desc id="desc">Algorithm figure for Progressive Re-detection Based Sports Tracking.</desc>
  <rect width="720" height="900" fill="#ffffff"/>
  <line x1="12" y1="15" x2="708" y2="15" stroke="#111" stroke-width="2"/>
  <line x1="12" y1="52" x2="708" y2="52" stroke="#111" stroke-width="1.4"/>
  <line x1="12" y1="884" x2="708" y2="884" stroke="#111" stroke-width="1.4"/>
  <text x="12" y="40" font-family="Times New Roman, Times, serif" font-size="28" font-weight="700">Algorithm 1</text>
  <text x="168" y="40" font-family="Times New Roman, Times, serif" font-size="28">Progressive Filtration</text>

  <g font-family="Times New Roman, Times, serif" font-size="18" fill="#111">
    <text x="24" y="76" font-weight="700">Input:</text>
    <text x="82" y="76">A video clip V = {f0, f1, ...}; VOT model V; JDE model J; predicted</text>
    <text x="82" y="99">target position Bt-1 at frame ft-1.</text>
    <text x="24" y="124" font-weight="700">Output:</text>
    <text x="94" y="124">bounding box Bt in each frame ft at t</text>
  </g>

  <g font-family="Courier New, Courier, monospace" font-size="17" fill="#111">
    <text x="18" y="148">0: Initialization Q &lt;- [], Nf &lt;- 0</text>
    <text x="18" y="171">0: for ft in V do</text>
    <text x="52" y="194">bv &lt;- V(ft)</text>
    <text x="52" y="217">Bj &lt;- J(ft)</text>
    <text x="52" y="240">Bc &lt;- Bj</text>

    <text x="52" y="286">/* Position Filtration */</text>
    <text x="52" y="309">for b in Bj do</text>
    <text x="86" y="332">if b not in Search Area or IoU(Bs,b) &lt; sigmaIOU then</text>
    <text x="120" y="355">Bc &lt;- Bc \ {b}</text>
    <text x="86" y="378">end if</text>
    <text x="52" y="401">end for</text>

    <text x="52" y="447">/* Cascade ID Filtration */</text>
    <text x="52" y="470">for b in Bc do</text>
    <text x="86" y="493">if Dis(Q,b.e) &lt; sigmaid1 then</text>
    <text x="120" y="516">Bc &lt;- Bc \ {b} # IDF1</text>
    <text x="120" y="539">Cascade Match and build trajectories</text>
    <text x="120" y="562">if b matched with Dt-1 in Cascade Match then</text>
    <text x="154" y="585">Bt &lt;- b, Q.push(b.e), Nf &lt;- 0</text>
    <text x="154" y="608">break</text>
    <text x="120" y="631">end if</text>
    <text x="120" y="654">if Dis(Q,b.e) &lt; sigmaid2 then</text>
    <text x="154" y="677">Bc &lt;- Bc \ {b} # IDF2</text>
    <text x="120" y="700">end if</text>
    <text x="86" y="723">end if</text>
    <text x="52" y="746">end for</text>

    <text x="52" y="792">if Bc is empty then</text>
    <text x="86" y="815">Bt &lt;- bv, Nf &lt;- Nf + 1</text>
    <text x="86" y="838">continue</text>
    <text x="52" y="861">end if</text>
  </g>
</svg>
